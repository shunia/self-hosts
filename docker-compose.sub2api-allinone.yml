services:
  sub2api:
    image: "weishaw/sub2api:latest"
    container_name: "sub2api"
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    depends_on:
      sub2api-postgres:
        condition: service_healthy
      sub2api-redis:
        condition: service_healthy
    volumes:
      - "./sub2api-data:/app/data"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      AUTO_SETUP: "true"

      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      SERVER_MODE: "${SUB2API_SERVER_MODE:-release}"
      RUN_MODE: "${SUB2API_RUN_MODE:-standard}"
      TZ: "${SUB2API_TZ:-Asia/Shanghai}"

      DATABASE_HOST: "sub2api-postgres"
      DATABASE_PORT: "5432"
      DATABASE_USER: "sub2api"
      DATABASE_PASSWORD: "${SUB2API_POSTGRES_PASSWORD:?FILL_SUB2API_POSTGRES_PASSWORD}"
      DATABASE_DBNAME: "sub2api"
      DATABASE_SSLMODE: "disable"

      REDIS_HOST: "sub2api-redis"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "${SUB2API_REDIS_PASSWORD:-}"
      REDIS_DB: "${SUB2API_REDIS_DB:-0}"
      REDIS_ENABLE_TLS: "false"

      ADMIN_EMAIL: "${SUB2API_ADMIN_EMAIL:-admin@sub2api.local}"
      ADMIN_PASSWORD: "${SUB2API_ADMIN_PASSWORD:-}"

      # Keep these fixed across restarts to avoid session / 2FA issues.
      JWT_SECRET: "${SUB2API_JWT_SECRET:?FILL_SUB2API_JWT_SECRET}"
      TOTP_ENCRYPTION_KEY: "${SUB2API_TOTP_ENCRYPTION_KEY:?FILL_SUB2API_TOTP_ENCRYPTION_KEY}"
      JWT_EXPIRE_HOUR: "${SUB2API_JWT_EXPIRE_HOUR:-24}"

      GEMINI_OAUTH_CLIENT_ID: "${SUB2API_GEMINI_OAUTH_CLIENT_ID:-}"
      GEMINI_OAUTH_CLIENT_SECRET: "${SUB2API_GEMINI_OAUTH_CLIENT_SECRET:-}"
      GEMINI_OAUTH_SCOPES: "${SUB2API_GEMINI_OAUTH_SCOPES:-}"
      GEMINI_QUOTA_POLICY: "${SUB2API_GEMINI_QUOTA_POLICY:-}"
      SECURITY_URL_ALLOWLIST_ENABLED: "${SUB2API_SECURITY_URL_ALLOWLIST_ENABLED:-true}"
      SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP: "${SUB2API_SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP:-false}"
      SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS: "${SUB2API_SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS:-false}"
      SECURITY_URL_ALLOWLIST_UPSTREAM_HOSTS: "${SUB2API_SECURITY_URL_ALLOWLIST_UPSTREAM_HOSTS:-}"
      UPDATE_PROXY_URL: "${SUB2API_UPDATE_PROXY_URL:-}"

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - traefik_proxy
      - sub2api_internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"
      - "traefik.http.routers.sub2api.rule=Host(`${SUB2API_DOMAIN:?FILL_SUB2API_DOMAIN}`)"
      - "traefik.http.routers.sub2api.entrypoints=websecure"
      - "traefik.http.routers.sub2api.tls.certresolver=myresolver"
      - "traefik.http.routers.sub2api.priority=10"
      - "traefik.http.routers.sub2api.middlewares=sub2api-global-ratelimit"
      - "traefik.http.services.sub2api.loadbalancer.server.port=8080"
      - "traefik.http.middlewares.sub2api-global-ratelimit.ratelimit.average=1800"
      - "traefik.http.middlewares.sub2api-global-ratelimit.ratelimit.period=1m"
      - "traefik.http.middlewares.sub2api-global-ratelimit.ratelimit.burst=400"
      - "traefik.http.routers.sub2api-login.rule=Host(`${SUB2API_DOMAIN:?FILL_SUB2API_DOMAIN}`) && Path(`/api/v1/auth/login`) && Method(`POST`)"
      - "traefik.http.routers.sub2api-login.entrypoints=websecure"
      - "traefik.http.routers.sub2api-login.tls.certresolver=myresolver"
      - "traefik.http.routers.sub2api-login.priority=200"
      - "traefik.http.routers.sub2api-login.service=sub2api"
      - "traefik.http.routers.sub2api-login.middlewares=sub2api-global-ratelimit,sub2api-login-ratelimit"
      - "traefik.http.middlewares.sub2api-login-ratelimit.ratelimit.average=20"
      - "traefik.http.middlewares.sub2api-login-ratelimit.ratelimit.period=1m"
      - "traefik.http.middlewares.sub2api-login-ratelimit.ratelimit.burst=40"

  sub2api-postgres:
    image: "postgres:18-alpine"
    container_name: "sub2api-postgres"
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    volumes:
      - "./sub2api-postgres-data:/var/lib/postgresql/data"
    environment:
      POSTGRES_USER: "sub2api"
      POSTGRES_PASSWORD: "${SUB2API_POSTGRES_PASSWORD:?FILL_SUB2API_POSTGRES_PASSWORD}"
      POSTGRES_DB: "sub2api"
      PGDATA: "/var/lib/postgresql/data"
      TZ: "${SUB2API_TZ:-Asia/Shanghai}"
    networks:
      - sub2api_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sub2api -d sub2api"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  sub2api-redis:
    image: "redis:8-alpine"
    container_name: "sub2api-redis"
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    volumes:
      - "./sub2api-redis-data:/data"
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --save 60 1 --appendonly yes --appendfsync everysec --requirepass "$$REDIS_PASSWORD"
        else
          exec redis-server --save 60 1 --appendonly yes --appendfsync everysec
        fi
    environment:
      TZ: "${SUB2API_TZ:-Asia/Shanghai}"
      REDIS_PASSWORD: "${SUB2API_REDIS_PASSWORD:-}"
      REDISCLI_AUTH: "${SUB2API_REDIS_PASSWORD:-}"
    networks:
      - sub2api_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  traefik_proxy:
    external: true
  sub2api_internal:
    name: sub2api_internal
