<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Private Projects</title>
    <style>
      :root {
        --bg: #efe9de;
        --panel: rgba(255, 252, 247, 0.9);
        --ink: #172033;
        --muted: #556072;
        --line: rgba(23, 32, 51, 0.12);
        --shadow: 0 24px 60px rgba(23, 32, 51, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans", "Noto Sans SC", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(194, 75, 47, 0.18), transparent 26%),
          radial-gradient(circle at bottom right, rgba(31, 107, 98, 0.16), transparent 22%),
          linear-gradient(135deg, #efe5d6 0%, var(--bg) 58%, #ece8df 100%);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(760px, 100%);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: var(--shadow);
        padding: 28px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      ul {
        margin: 24px 0 0;
        padding-left: 20px;
      }

      li + li {
        margin-top: 10px;
      }

      a {
        color: inherit;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Private</h1>
      <p>这个目录下的内容统一通过 Traefik 基础认证保护，后续需要受控访问的页面或静态文件可以放在这里。</p>
      <ul>
        <li><a href="/private/xray_qrcode.html">Xray QR Code</a></li>
      </ul>
    </main>
  </body>
  </html>
