services:
  docker-socket-proxy:
    image: "ghcr.io/tecnativa/docker-socket-proxy:0.4.2@sha256:1f3a6f303320723d199d2316a3e82b2e2685d86c275d5e3deeaf182573b47476"
    container_name: "docker-socket-proxy"
    restart: unless-stopped
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    environment:
      CONTAINERS: 1
      EVENTS: 1
      NETWORKS: 1
      PING: 1
      VERSION: 1
    networks:
      - socket_proxy

  traefik:
    image: "traefik:v3.6.9@sha256:9004e1cd1e33c5eb0b6ec02bc6cfda61fe9caca36751114b1c9c6662f01b264a"
    container_name: "traefik"
    restart: unless-stopped
    depends_on:
      - docker-socket-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "./traefik-data/traefik.yml:/etc/traefik/traefik.yml:ro"
      - "./traefik-data/acme.json:/etc/traefik/acme.json"
      - "./traefik-data/logs:/var/log/traefik"
    networks:
      - traefik_proxy
      - socket_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`${TRAEFIK_DASHBOARD_DOMAIN:?FILL_TRAEFIK_DASHBOARD_DOMAIN}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=myresolver"
      - "traefik.http.routers.traefik-dashboard.middlewares=dashboard-auth,dashboard-ipallowlist,dashboard-ratelimit"
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH:?FILL_TRAEFIK_DASHBOARD_AUTH_BCRYPT}"
      - "traefik.http.middlewares.dashboard-ipallowlist.ipallowlist.sourcerange=${TRAEFIK_DASHBOARD_ALLOWLIST:?FILL_TRAEFIK_DASHBOARD_ALLOWLIST}"
      - "traefik.http.middlewares.dashboard-ratelimit.ratelimit.average=30"
      - "traefik.http.middlewares.dashboard-ratelimit.ratelimit.period=1m"
      - "traefik.http.middlewares.dashboard-ratelimit.ratelimit.burst=60"

  vaultwarden:
    image: "vaultwarden/server:1.35.4@sha256:43498a94b22f9563f2a94b53760ab3e710eefc0d0cac2efda4b12b9eb8690664"
    container_name: "vaultwarden"
    restart: unless-stopped
    volumes:
      - "./vw-data:/data"
    environment:
      WEBSOCKET_ENABLED: "true"
      ADMIN_TOKEN: "${VAULTWARDEN_ADMIN_TOKEN:-}"
      SIGNUPS_ALLOWED: "false"
    networks:
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vaultwarden-http.rule=Host(`${VAULTWARDEN_DOMAIN:?FILL_VAULTWARDEN_DOMAIN}`)"
      - "traefik.http.routers.vaultwarden-http.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden-http.service=vaultwarden-svc"
      - "traefik.http.routers.vaultwarden-http.tls.certresolver=myresolver"
      - "traefik.http.routers.vaultwarden-http.observability.accesslogs=false"
      - "traefik.http.routers.vaultwarden-ws.rule=Host(`${VAULTWARDEN_DOMAIN:?FILL_VAULTWARDEN_DOMAIN}`) && Path(`/notifications/hub`)"
      - "traefik.http.routers.vaultwarden-ws.entrypoints=websecure"
      - "traefik.http.routers.vaultwarden-ws.service=vaultwarden-ws-svc"
      - "traefik.http.routers.vaultwarden-ws.tls.certresolver=myresolver"
      - "traefik.http.routers.vaultwarden-ws.observability.accesslogs=false"
      - "traefik.http.services.vaultwarden-svc.loadbalancer.server.port=80"
      - "traefik.http.services.vaultwarden-ws-svc.loadbalancer.server.port=3012"

  xray:
    image: "ghcr.io/xtls/xray-core:26.4.17@sha256:1880a26aee27e82d779b9632a88d5256403e8b33d9abffa1c7920f2fffb73bc3"
    container_name: "xray"
    restart: unless-stopped
    command:
      - "run"
      - "-config"
      - "/etc/xray/config.json"
    volumes:
      - "./generated-config/xray/config.json:/etc/xray/config.json:ro"
    networks:
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"
      - "traefik.http.routers.xray.rule=Host(`${XRAY_DOMAIN:?FILL_XRAY_DOMAIN}`) && (Path(`/ray`) || PathPrefix(`/ray/`))"
      - "traefik.http.routers.xray.entrypoints=websecure"
      - "traefik.http.routers.xray.tls.certresolver=myresolver"
      - "traefik.http.services.xray.loadbalancer.server.port=10000"
      - "traefik.http.services.xray.loadbalancer.server.scheme=h2c"

  projects:
    build:
      context: "./projects-server"
    image: "docker-compose-projects:local"
    container_name: "projects"
    restart: unless-stopped
    environment:
      PROJECTS_BIND_HOST: "0.0.0.0"
      PROJECTS_PORT: "8080"
      XRAY_DOMAIN: "${XRAY_DOMAIN:?FILL_XRAY_DOMAIN}"
    security_opt:
      - "no-new-privileges:true"
    cap_drop:
      - ALL
    tmpfs:
      - "/tmp:size=32m,noexec,nosuid,nodev,mode=1777"
    volumes:
      - "./projects:/srv/projects:ro"
      - "./xray-config:/srv/xray:ro"
      - "./generated-config/xray/config.json:/srv/xray/config.json:ro"
    expose:
      - "8080"
    networks:
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"
      - "traefik.http.routers.projects.rule=Host(`${PROJECTS_DOMAIN:?FILL_PROJECTS_DOMAIN}`)"
      - "traefik.http.routers.projects.entrypoints=websecure"
      - "traefik.http.routers.projects.tls.certresolver=myresolver"
      - "traefik.http.services.projects.loadbalancer.server.port=8080"

  homepage:
    image: "ghcr.io/gethomepage/homepage:latest"
    container_name: "homepage"
    restart: unless-stopped
    environment:
      HOMEPAGE_ALLOWED_HOSTS: "${HOMEPAGE_ALLOWED_HOSTS:?FILL_HOMEPAGE_ALLOWED_HOSTS}"
    volumes:
      - "./homepage-config:/app/config"
      - "./generated-config/homepage/services.yaml:/app/config/services.yaml:ro"
    networks:
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"
      - "traefik.http.routers.homepage.rule=Host(`${HOMEPAGE_DOMAIN:?FILL_HOMEPAGE_DOMAIN}`)"
      - "traefik.http.routers.homepage.entrypoints=websecure"
      - "traefik.http.routers.homepage.tls.certresolver=myresolver"
      - "traefik.http.services.homepage.loadbalancer.server.port=3000"

networks:
  traefik_proxy:
    name: traefik_proxy
  socket_proxy:
    name: socket_proxy
