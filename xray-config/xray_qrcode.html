<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Xray QR Code</title>
    <style>
      :root {
        --paper: #f3efe7;
        --panel: rgba(255, 252, 247, 0.88);
        --ink: #1b2437;
        --muted: #5f6a7e;
        --accent: #b8482f;
        --accent-2: #0f6a73;
        --line: rgba(27, 36, 55, 0.12);
        --shadow: 0 30px 80px rgba(27, 36, 55, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "IBM Plex Sans", "Noto Sans SC", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 16% 20%, rgba(184, 72, 47, 0.22), transparent 18%),
          radial-gradient(circle at 82% 14%, rgba(15, 106, 115, 0.2), transparent 20%),
          linear-gradient(145deg, #e9decb 0%, var(--paper) 56%, #ece8e0 100%);
        padding: 24px;
      }

      .shell {
        width: min(1100px, 100%);
        margin: 0 auto;
        display: grid;
        gap: 22px;
      }

      .hero,
      .panel {
        background: var(--panel);
        backdrop-filter: blur(14px);
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: var(--shadow);
      }

      .hero {
        padding: 28px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(184, 72, 47, 0.1);
        color: var(--accent);
        font-size: 0.9rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      h1 {
        margin: 16px 0 8px;
        font-size: clamp(2.3rem, 5vw, 4.4rem);
        line-height: 0.95;
      }

      .hero p {
        margin: 0;
        max-width: 760px;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.7;
      }

      .grid {
        display: grid;
        grid-template-columns: 1.2fr 0.8fr;
        gap: 22px;
      }

      .panel {
        padding: 24px;
      }

      .section-title {
        margin: 0 0 18px;
        font-size: 1.15rem;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      label {
        display: block;
        font-size: 0.92rem;
        color: var(--muted);
        margin-bottom: 8px;
      }

      select,
      textarea,
      input {
        width: 100%;
        border: 1px solid rgba(27, 36, 55, 0.14);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.78);
        color: var(--ink);
        font: inherit;
      }

      select,
      input {
        padding: 14px 16px;
      }

      textarea {
        min-height: 160px;
        resize: vertical;
        padding: 16px;
        line-height: 1.55;
      }

      .notes {
        margin-top: 14px;
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(15, 106, 115, 0.08);
        color: var(--ink);
      }

      .meta {
        display: grid;
        gap: 10px;
        margin-top: 18px;
      }

      .meta-row {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        padding-bottom: 10px;
        border-bottom: 1px dashed rgba(27, 36, 55, 0.12);
      }

      .meta-row span:first-child {
        color: var(--muted);
      }

      .qr-wrap {
        display: grid;
        justify-items: center;
        gap: 18px;
      }

      .qr-card {
        width: min(100%, 360px);
        aspect-ratio: 1;
        border-radius: 24px;
        background: white;
        border: 1px solid rgba(27, 36, 55, 0.08);
        padding: 18px;
        display: grid;
        place-items: center;
      }

      .qr-card img {
        width: 100%;
        height: 100%;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      button,
      .button-link {
        appearance: none;
        border: 0;
        border-radius: 999px;
        padding: 12px 18px;
        font: inherit;
        cursor: pointer;
        text-decoration: none;
        transition: transform 160ms ease, opacity 160ms ease;
      }

      button:hover,
      .button-link:hover {
        transform: translateY(-1px);
      }

      .primary {
        background: linear-gradient(135deg, var(--accent), #d2673f);
        color: white;
      }

      .secondary {
        background: rgba(15, 106, 115, 0.1);
        color: var(--accent-2);
      }

      .status {
        min-height: 1.3em;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .hint {
        margin-top: 16px;
        color: var(--muted);
        line-height: 1.6;
        font-size: 0.94rem;
      }

      @media (max-width: 860px) {
        .grid {
          grid-template-columns: 1fr;
        }

        .field-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <div class="eyebrow">Live Xray Share</div>
        <h1>Xray QR Code</h1>
        <p>
          这个页面不会把导入内容硬编码在 HTML 里，而是由服务端实时读取当前
          Xray 配置并生成二维码与导入链接。只要 `xray-config/config.json`
          或 `XRAY_DOMAIN` 变了，这个页面刷新后就会跟着更新。
        </p>
      </section>

      <section class="grid">
        <article class="panel">
          <h2 class="section-title">Client Profile</h2>
          <div class="field-grid">
            <div>
              <label for="client-select">客户端</label>
              <select id="client-select"></select>
            </div>
            <div>
              <label for="transport-view">当前传输</label>
              <input id="transport-view" value="xhttp + h2" readonly />
            </div>
          </div>

          <div class="notes" id="client-notes"></div>

          <div class="meta">
            <div class="meta-row"><span>节点域名</span><strong id="meta-domain">-</strong></div>
            <div class="meta-row"><span>端口</span><strong id="meta-port">-</strong></div>
            <div class="meta-row"><span>路径</span><strong id="meta-path">-</strong></div>
            <div class="meta-row"><span>ALPN</span><strong id="meta-alpn">-</strong></div>
            <div class="meta-row"><span>最近生成时间</span><strong id="meta-updated">-</strong></div>
          </div>

          <div class="hint">
            当前这些客户端导入的 URI 基本一致，保留下拉框是为了后续遇到客户端差异时可以单独做参数兼容，而不用再改页面入口。
          </div>
        </article>

        <article class="panel qr-wrap">
          <h2 class="section-title">QR Code</h2>
          <div class="qr-card">
            <img id="qr-image" alt="Xray QR Code" />
          </div>
          <div class="actions">
            <button class="primary" id="copy-link" type="button">复制导入链接</button>
            <a class="button-link secondary" id="open-link" href="#" target="_blank" rel="noopener noreferrer">直接打开链接</a>
          </div>
          <div class="status" id="status"></div>
        </article>
      </section>

      <section class="panel">
        <h2 class="section-title">Share URI</h2>
        <textarea id="share-uri" readonly></textarea>
      </section>
    </main>

    <script>
      const state = {
        payload: null,
        activeClient: "generic",
      };

      const elements = {
        select: document.getElementById("client-select"),
        notes: document.getElementById("client-notes"),
        shareUri: document.getElementById("share-uri"),
        qrImage: document.getElementById("qr-image"),
        status: document.getElementById("status"),
        copyLink: document.getElementById("copy-link"),
        openLink: document.getElementById("open-link"),
        domain: document.getElementById("meta-domain"),
        port: document.getElementById("meta-port"),
        path: document.getElementById("meta-path"),
        alpn: document.getElementById("meta-alpn"),
        updated: document.getElementById("meta-updated"),
      };

      function formatDate(isoString) {
        const date = new Date(isoString);
        if (Number.isNaN(date.getTime())) {
          return isoString;
        }
        return new Intl.DateTimeFormat("zh-CN", {
          dateStyle: "medium",
          timeStyle: "medium",
        }).format(date);
      }

      function profileById(clientId) {
        return state.payload.profiles.find((profile) => profile.id === clientId) || state.payload.profiles[0];
      }

      function updateView() {
        const profile = profileById(state.activeClient);
        const share = state.payload.share;

        elements.notes.textContent = profile.notes;
        elements.shareUri.value = profile.uri;
        elements.openLink.href = profile.uri;
        elements.qrImage.src = `/__meta/xray-qr.svg?client=${encodeURIComponent(profile.id)}&t=${Date.now()}`;
        elements.domain.textContent = share.domain;
        elements.port.textContent = String(share.port);
        elements.path.textContent = share.path;
        elements.alpn.textContent = share.alpn;
        elements.updated.textContent = formatDate(share.updated_at);
        elements.status.textContent = `当前配置：${profile.name}`;
      }

      async function copyUri() {
        try {
          await navigator.clipboard.writeText(elements.shareUri.value);
          elements.status.textContent = "导入链接已复制到剪贴板";
        } catch (error) {
          elements.status.textContent = "复制失败，请手动复制文本框中的内容";
        }
      }

      async function loadPayload() {
        const response = await fetch("/__meta/xray-share.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        state.payload = await response.json();

        const search = new URLSearchParams(window.location.search);
        const requestedClient = search.get("client");
        const initialClient = state.payload.profiles.some((profile) => profile.id === requestedClient)
          ? requestedClient
          : state.payload.profiles[0].id;

        elements.select.innerHTML = "";
        for (const profile of state.payload.profiles) {
          const option = document.createElement("option");
          option.value = profile.id;
          option.textContent = profile.name;
          elements.select.appendChild(option);
        }

        state.activeClient = initialClient;
        elements.select.value = initialClient;
        updateView();
      }

      elements.select.addEventListener("change", () => {
        state.activeClient = elements.select.value;
        updateView();
      });

      elements.copyLink.addEventListener("click", copyUri);

      loadPayload().catch((error) => {
        elements.status.textContent = `加载失败：${error.message}`;
      });
    </script>
  </body>
  </html>
